<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
        }
        h1 { color: #ecf0f1; margin-bottom: 20px; }
        #game-container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        canvas {
            border: 3px solid #ecf0f1;
            background-color: #1a1a1a;
        }
        #score-board {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            color: #ecf0f1;
        }
        #score { font-size: 24px; font-weight: bold; }
        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇游戏</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="score-board">
            <div>分数：<span id="score">0</span></div>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 5, y: 10}, {x: 4, y: 10}, {x: 3, y: 10}];
        let food = {};
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = false;
        let gameSpeed = 100;
        
        function initGame() {
            snake = [{x: 5, y: 10}, {x: 4, y: 10}, {x: 3, y: 10}];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            document.getElementById('score').textContent = score;
            gameRunning = true;
            spawnFood();
        }
        
        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            }
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            setTimeout(gameLoop, gameSpeed);
        }
        
        function update() {
            direction = nextDirection;
            const speed = gameSpeed / 1000 * 60;
            let head = { ...snake[0] };
            switch (direction) {
                case 'UP':
                    head.y -= 1;
                    break;
                case 'DOWN':
                    head.y += 1;
                    break;
                case 'LEFT':
                    head.x -= 1;
                    break;
                case 'RIGHT':
                    head.x += 1;
                    break;
            }
            
            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            // 移动蛇
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;
            ctx.arc(foodX, foodY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#27ae60';
                } else {
                    ctx.fillStyle = '#2ecc71';
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
            ctx.font = '18px Arial';
            ctx.fillStyle = '#ecf0f1';
            ctx.fillText('最终分数：' + score, canvas.width / 2, canvas.height / 2 + 40);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'DOWN') nextDirection = 'UP';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== 'UP') nextDirection = 'DOWN';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== 'RIGHT') nextDirection = 'LEFT';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== 'LEFT') nextDirection = 'RIGHT';
                    e.preventDefault();
                    break;
            }
        });
        
        // 重新开始按钮
        document.getElementById('restartBtn').addEventListener('click', initGame);
        
        // 启动游戏
        initGame();
        gameLoop();
    </script>
</body>
</html>
